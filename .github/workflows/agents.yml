name: 🏢 Mudholkars & Co

on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'  # Trading: every 15 min Mon-Fri
    - cron: '0 */2 * * *'        # Research: every 2 hours
    - cron: '30 4 * * 6'         # Weekend deep scan
    - cron: '30 14 * * 0'        # Sunday learning review
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: pip install -r requirements.txt -q

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_github.py

      - name: Save reports
        if: always()
        run: |
          git config user.name "Mudholkars Bot"
          git config user.email "bot@mudholkars.co"
          git add reports/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 $(TZ=Asia/Kolkata date '+%d %b %H:%M')"
          git push || true
