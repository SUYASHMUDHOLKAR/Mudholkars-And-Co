name: 🏢 Mudholkars & Co

on:
  schedule:
    # Trading hours: every 15 min, Mon-Fri, 9:00-15:30 IST (3:30-10:00 UTC)
    - cron: '*/15 3-10 * * 1-5'
    # Research: every 2 hours (off-market intel scan)
    - cron: '0 */2 * * *'
    # Weekend strategy: Saturday 10:00 IST (4:30 UTC)
    - cron: '30 4 * * 6'
    # Sunday learning review: 20:00 IST (14:30 UTC)
    - cron: '30 14 * * 0'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: pip install -r requirements.txt -q

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INITIAL_CAPITAL: ${{ secrets.INITIAL_CAPITAL || '1000000' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_github.py

      - name: Save reports
        if: always()
        run: |
          git config user.name "Mudholkars Bot"
          git config user.email "bot@mudholkars.co"
          git add reports/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 $(TZ=Asia/Kolkata date '+%d %b %H:%M')"
          git push || true
